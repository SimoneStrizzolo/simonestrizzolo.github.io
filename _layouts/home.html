---
layout: default
---

<div class="home">
  {{ content }}

  <section class="posts">
    <h2>Ultimi articoli</h2>
    <ul>
      {% for post in site.posts limit:5 %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span class="date">{{ post.date | date: "%d %B %Y" }}</span>
      </li>
      {% endfor %}
    </ul>
  </section>
</div>
